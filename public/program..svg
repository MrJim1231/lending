<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(128 128) rotate(90) scale(128)">
      <stop offset="0%" stop-color="#2F7DFF"/>
      <stop offset="70%" stop-color="#1E56E6"/>
      <stop offset="100%" stop-color="#1237A8"/>
    </radialGradient>

    <linearGradient id="ring" x1="40" y1="40" x2="216" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8ED3FF"/>
      <stop offset="100%" stop-color="#2D7DFF"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <circle cx="128" cy="128" r="112" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="106" stroke="url(#ring)" stroke-width="8" opacity="0.9"/>
  <circle cx="128" cy="128" r="95" stroke="#8FD3FF" stroke-width="2" opacity="0.2"/>

  <!-- mode dial -->
  <g filter="url(#glow)">
    <circle cx="118" cy="132" r="46" stroke="white" stroke-width="10" fill="none"/>
    <circle cx="118" cy="132" r="8" fill="white"/>

    <!-- dial ticks -->
    <path d="M118 78V92" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M79 93L89 101" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M64 132H78" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M79 171L89 163" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M118 186V172" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M157 171L147 163" stroke="white" stroke-width="8" stroke-linecap="round"/>

    <!-- pointer -->
    <path d="M118 132L146 108" stroke="#FFD400" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- lightning -->
  <g filter="url(#glow)">
    <path d="M174 74L150 126H173L146 184L198 116H175L174 74Z" fill="#FFD400"/>
  </g>
</svg>