<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-project</title>
  </head>
  <body>
    <div id="app">
      <section class="hero">
        <div class="hero__header">
          <div class="hero__title">
              <span class="hero__title-small">МУЗИКАЛЬНИЙ</span>
              <h1 class="hero__title-big">ТРЕНАЖЕР ДЛЯ БОКСУ</h1>
          </div>
          <div class="hero__badge-row">
              <div class="hero__badge-yellow">НАВЧАЙСЯ РЕАКЦІЇ ВДОМА!</div>
              <div class="hero__badge-bluetooth">
                  <img src="/bluetooth-icon.svg" alt="Bluetooth" />
                  <span>BLUETOOTH<br/>МУЗИКА</span>
              </div>
          </div>
        </div>
    
        <div class="hero__imagery">
            <img src="/simulator.png" class="hero__image-simulator" alt="Boxing Simulator" />
            <img src="/boy.png" class="hero__image-boy" alt="Boxing Boy" />
            <div class="hero__badge-gloves">
                <div class="hero__badge-gloves-text">
                    <span>РУКАВИЧКИ</span>
                    <span class="yellow">В ПОДАРУНОК</span>
                </div>
                <img src="/gloves.png" alt="Gloves" />
            </div>
        </div>
    
        <div class="hero__features">
            <div class="hero__feature">
                <img src="/bluetooth-icon.svg" alt="" />
                <span>Bluetooth музика</span>
            </div>
            <div class="hero__feature">
                <img src="/training-modes.svg" alt="" />
                <span>9 режимів тренування</span>
            </div>
            <div class="hero__feature">
                <img src="/led-icon.svg" alt="" />
                <span>LED підсвітка для реакції</span>
            </div>
            <div class="hero__feature">
                <img src="/counter.svg" alt="" />
                <span>Лічильник ударів</span>
            </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
