<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(128 128) rotate(90) scale(128)">
      <stop offset="0%" stop-color="#2F7DFF"/>
      <stop offset="70%" stop-color="#1E56E6"/>
      <stop offset="100%" stop-color="#1237A8"/>
    </radialGradient>

    <linearGradient id="ring" x1="40" y1="40" x2="216" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8ED3FF"/>
      <stop offset="100%" stop-color="#2D7DFF"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <circle cx="128" cy="128" r="112" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="106" stroke="url(#ring)" stroke-width="8" opacity="0.9"/>
  <circle cx="128" cy="128" r="95" stroke="#8FD3FF" stroke-width="2" opacity="0.2"/>

  <!-- bluetooth symbol -->
  <g filter="url(#glow)">
    <path d="M128 52V204" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M128 52L168 88L128 128L168 168L128 204" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M88 88L128 128L88 168" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- sound waves -->
  <g opacity="0.95" filter="url(#glow)" stroke="#FFD400" stroke-width="8" stroke-linecap="round">
    <path d="M184 98C196 108 202 117 202 128C202 139 196 148 184 158"/>
    <path d="M68 98C56 108 50 117 50 128C50 139 56 148 68 158"/>
  </g>
</svg>