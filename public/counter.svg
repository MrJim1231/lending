<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2F7DFF"/>
      <stop offset="70%" stop-color="#1E56E6"/>
      <stop offset="100%" stop-color="#1237A8"/>
    </radialGradient>

    <filter id="glow4">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- background -->
  <circle cx="128" cy="128" r="112" fill="url(#bg4)"/>

  <!-- counter icon -->
  <g filter="url(#glow4)" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- small scoreboard -->
    <rect x="60" y="80" width="136" height="96" rx="18" fill="none"/>

    <!-- numbers -->
    <line x1="98" y1="108" x2="98" y2="148"/>
    <circle cx="148" cy="128" r="20"/>

  </g>

</svg>