<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2F7DFF"/>
      <stop offset="70%" stop-color="#1E56E6"/>
      <stop offset="100%" stop-color="#1237A8"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- background -->
  <circle cx="128" cy="128" r="112" fill="url(#bg)"/>

  <!-- screen -->
  <g filter="url(#glow)">
    <rect x="64" y="72" width="128" height="88" rx="14" fill="#0B1F4D" stroke="#8ED3FF" stroke-width="6"/>
  </g>

  <!-- display numbers -->
  <text x="128" y="120" text-anchor="middle" font-size="28" font-family="Arial" fill="#00E5FF">239</text>

  <!-- stats bars -->
  <rect x="84" y="132" width="14" height="18" rx="3" fill="#00E5FF"/>
  <rect x="108" y="124" width="14" height="26" rx="3" fill="#00E5FF"/>
  <rect x="132" y="114" width="14" height="36" rx="3" fill="#00E5FF"/>
  <rect x="156" y="128" width="14" height="22" rx="3" fill="#00E5FF"/>

  <!-- base -->
  <rect x="108" y="166" width="40" height="10" rx="5" fill="#FFFFFF"/>

</svg>