<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-project</title>
  </head>
  <body>
    <div id="app">
      <section class="hero">
        <div class="hero__header">
          <div class="hero__title">
              <span class="hero__title-small">МУЗИКАЛЬНИЙ</span>
              <h1 class="hero__title-big">ТРЕНАЖЕР ДЛЯ БОКСУ</h1>
          </div>
          <div class="hero__badge-row">
              <div class="hero__badge-yellow">НАВЧАЙСЯ РЕАКЦІЇ ВДОМА!</div>
              <div class="hero__badge-bluetooth">
                  <img src="/bluetooth-icon.svg" alt="Bluetooth" />
                  <span>BLUETOOTH<br/>МУЗИКА</span>
              </div>
          </div>
        </div>
    
        <div class="hero__imagery">
            <img src="/simulator.png" class="hero__image-simulator" alt="Boxing Simulator" />
            <img src="/boy2.png" class="hero__image-boy" alt="Boxing Boy" />
            <div class="hero__badge-gloves">
                <img src="/gloves.png" alt="Gloves" />
                <div class="hero__badge-gloves-text">
                    <span>РУКАВИЧКИ</span>
                    <span class="yellow">В ПОДАРУНОК</span>
                </div>
            </div>
        </div>
    
        <div class="hero__cta">
            <div class="hero__timer">
                <span class="hero__timer-label">До кінця акції залишилось:</span>
                <div class="hero__timer-clock" id="timer">
                    <div class="timer-item"><span>00</span><small>год</small></div>
                    <div class="timer-divider">:</div>
                    <div class="timer-item"><span>29</span><small>хв</small></div>
                    <div class="timer-divider">:</div>
                    <div class="timer-item"><span>59</span><small>сек</small></div>
                </div>
            </div>

            <div class="hero__price">
                <div class="price-old">2000 <span>грн</span></div>
                <div class="price-new">1000 <span>грн</span></div>
            </div>

            <button class="hero__btn">
                ЗАМОВИТИ ЗІ ЗНИЖКОЮ
            </button>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
